name: Build FBFix Dylib
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Build dylib
        run: make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: FBFix-dylib
          path: .theos/obj/**/*.dylib

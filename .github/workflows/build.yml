name: Build FBFix Dylib
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: kabiroberai/theos-action@v2
        with:
          sdk-version: '16.5'
          theos-src: 'https://github.com/theos/theos'

      - name: Build dylib
        run: make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: FBFix-dylib
          path: .theos/obj/FBFix.dylib

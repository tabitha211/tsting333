name: Build FBFix Dylib
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        run: |
          curl -LO https://github.com/theos/sdks/releases/download/2024-10-03/iPhoneOS16.5.sdk.tar.xz
          mkdir -p theos/sdks
          tar xf iPhoneOS16.5.sdk.tar.xz -C theos/sdks/

      - name: Build dylib
        env:
          THEOS: ${{ github.workspace }}/theos
        run: make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: FBFix-dylib
          path: .theos/obj/FBFix.dylib
